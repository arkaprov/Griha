<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Griha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">
    <!-- Navbar -->
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-600 to-purple-600 flex items-center justify-center text-white font-bold text-xl shadow-lg">G</div>
                    <span class="font-extrabold text-xl bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600 tracking-tight">Griha</span>
                </div>
                <div class="flex items-center gap-4">
                    <span class="text-sm font-medium text-gray-500 hidden sm:block">Welcome, <span th:text="${username}" class="text-gray-900 font-semibold">User</span></span>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="text-sm font-medium text-red-600 hover:text-red-700 bg-red-50 hover:bg-red-100 px-4 py-2 rounded-lg transition-colors">Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 animate-fade-in-up">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Your Repairs</h1>
                <p class="text-gray-500 mt-1">Manage and track your home maintenance tasks.</p>
            </div>
            <a href="/task/new" class="inline-flex items-center justify-center px-5 py-2.5 bg-gray-900 hover:bg-black text-white rounded-xl font-medium transition-all shadow-md hover:shadow-lg transform active:scale-95 whitespace-nowrap">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                New Task
            </a>
        </div>

        <div th:if="${tasks.empty}" class="bg-white rounded-3xl border border-dashed border-gray-300 p-12 text-center shadow-sm">
            <div class="w-16 h-16 mx-auto bg-gray-50 rounded-full flex items-center justify-center mb-4 border border-gray-100">
                <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            </div>
            <h3 class="text-lg font-semibold text-gray-900 mb-1">No repair tasks yet</h3>
            <p class="text-gray-500 mb-6 text-sm">Get started by creating a new maintenance task.</p>
            <a href="/task/new" class="text-blue-600 font-semibold hover:text-blue-700 transition-colors">Create Task &rarr;</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            <div th:each="task : ${tasks}" class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 hover:shadow-md hover:border-blue-100 transition-all relative group flex flex-col h-full transform hover:-translate-y-1">
                <div class="flex justify-between items-start mb-4">
                    <span th:text="${task.category}" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-blue-50 text-blue-700 uppercase tracking-widest">Category</span>
                    <span th:if="${task.status == 'Pending'}" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-yellow-50 text-yellow-700 uppercase tracking-widest" th:text="${task.status}"></span>
                    <span th:if="${task.status == 'In Progress'}" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-purple-50 text-purple-700 uppercase tracking-widest" th:text="${task.status}"></span>
                    <span th:if="${task.status == 'Completed'}" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-green-50 text-green-700 uppercase tracking-widest" th:text="${task.status}"></span>
                </div>
                <h3 th:text="${task.title}" class="text-xl font-bold text-gray-900 mb-2 leading-tight">Task Title</h3>
                <p th:text="${task.description}" class="text-gray-500 text-sm mb-6 flex-grow whitespace-pre-line"></p>
                
                <div class="flex gap-2 mt-auto pt-4 border-t border-gray-50">
                    <a th:href="@{/task/edit/{id}(id=${task.id})}" class="flex-1 text-center py-2.5 bg-gray-50 hover:bg-gray-100 text-gray-700 font-semibold rounded-xl text-sm transition-colors border border-gray-200">Edit Task</a>
                    <form th:action="@{/task/delete/{id}(id=${task.id})}" method="post" class="flex-none">
                        <button type="submit" class="p-2.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-xl transition-colors border border-transparent hover:border-red-100" onclick="return confirm('Delete this repair task permanently?')">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
